{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="mb-3">
      <a href="{% url 'customer_detail' customer.pk %}" style="color:var(--text3);text-decoration:none;font-size:0.85rem;font-weight:500;">← Back to {{ customer.name }}</a>
    </div>
    <div class="card p-4">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#f5a623,#f7c948);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">💳</div>
        <div>
          <div class="section-title" style="font-size:1.1rem;">{{ title }}</div>
          <div style="font-size:0.78rem;color:var(--text3);">Customer: <strong>{{ customer.name }}</strong></div>
        </div>
      </div>
      <hr style="border-color:var(--border);margin-bottom:20px;">
      <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div style="color:var(--accent);font-size:0.82rem;margin-top:6px;font-weight:600;">⚠ {{ field.errors.0 }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">{{ btn }}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
